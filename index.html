<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聶.NET - 拟态主页</title>
    <style>
        :root {
            /* 拟态核心色：暖灰底色，比纯灰/纯白更能凸显光影厚度 */
            --bg-color: #e0e5ec;
            --text-main: #2d3748;
            --text-sub: #718096;
            
            /* 阴影变量：高光与暗部，调节透明度实现柔和过渡 */
            --shadow-dark: rgba(163, 177, 198, 0.7);
            --shadow-light: rgba(255, 255, 255, 0.9);
            
            /* 强调色：极客蓝 */
            --primary: #4e80ee;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* 赋予所有交互平滑的物理过渡感 */
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Consolas', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 1. 主容器：悬浮呼吸动画 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        .neumorphic-card {
            width: 850px;
            min-height: 480px;
            border-radius: 35px;
            background: var(--bg-color);
            /* 多层阴影缔造厚重感 */
            box-shadow: 20px 20px 40px var(--shadow-dark),
                       -20px -20px 40px var(--shadow-light);
            padding: 50px;
            display: flex;
            gap: 50px;
            animation: float 6s ease-in-out infinite;
            position: relative;
        }

        /* 2. 左侧：个人轮廓与头像 */
        .profile-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* 头像外圈：旋转虚线动画 */
        .avatar-container {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            padding: 8px;
            background: var(--bg-color);
            box-shadow: 10px 10px 20px var(--shadow-dark),
                       -10px -10px 20px var(--shadow-light);
            margin-bottom: 25px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 2px dashed var(--primary);
            animation: spin 12s linear infinite;
            opacity: 0.4;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* 头像本体：内凹质感 */
        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--bg-color);
            box-shadow: inset 6px 6px 12px var(--shadow-dark),
                       inset -6px -6px 12px var(--shadow-light);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            font-weight: bold;
            color: var(--primary);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .name {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .bio {
            font-size: 13px;
            color: var(--text-sub);
            line-height: 1.8;
            margin-bottom: 35px;
        }

        /* 快捷操作按钮组 */
        .btn-group {
            display: flex;
            gap: 20px;
        }

        .icon-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-sub);
            font-weight: bold;
            font-size: 14px;
            background: linear-gradient(145deg, #e0e5ec, #f1f5fa);
            box-shadow: 7px 7px 14px var(--shadow-dark),
                       -7px -7px 14px var(--shadow-light);
        }

        .icon-btn:hover {
            color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 10px 10px 20px var(--shadow-dark),
                       -10px -10px 20px var(--shadow-light);
        }

        /* 按下时丝滑转为内阴影 */
        .icon-btn:active {
            transform: translateY(0);
            box-shadow: inset 5px 5px 10px var(--shadow-dark),
                       inset -5px -5px 10px var(--shadow-light);
        }

        /* 3. 右侧：内容与数据大屏 */
        .content-section {
            flex: 1.4;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* 数据面板：强内凹感 */
        .inset-panel {
            background: var(--bg-color);
            border-radius: 24px;
            padding: 30px;
            box-shadow: inset 8px 8px 16px var(--shadow-dark),
                       inset -8px -8px 16px var(--shadow-light);
        }

        .panel-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .panel-title::before {
            content: '';
            display: block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            margin-right: 12px;
            box-shadow: 0 0 10px var(--primary);
        }

        /* 进度条动画与扫光（Shimmer）效果 */
        .skill-item {
            margin-bottom: 18px;
        }

        .skill-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-sub);
        }

        .progress-bar-bg {
            height: 12px;
            border-radius: 12px;
            background: var(--bg-color);
            box-shadow: inset 4px 4px 8px var(--shadow-dark),
                       inset -4px -4px 8px var(--shadow-light);
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 12px;
            background: var(--primary);
            position: relative;
            /* 初始宽度设为0，通过JS实现加载动画 */
            width: 0;
            transition: width 1.5s cubic-bezier(0.1, 0.5, 0.2, 1);
        }

        /* 扫光动效 */
        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            animation: shimmer 2.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* 底部宽按钮 */
        .block-btn {
            display: block;
            text-align: center;
            padding: 18px;
            border-radius: 18px;
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 2px;
            background: var(--bg-color);
            box-shadow: 8px 8px 16px var(--shadow-dark),
                       -8px -8px 16px var(--shadow-light);
        }

        .block-btn:hover {
            box-shadow: inset 6px 6px 12px var(--shadow-dark),
                       inset -6px -6px 12px var(--shadow-light);
            transform: scale(0.98);
        }

    </style>
</head>
<body>

    <div class="neumorphic-card">
        <div class="profile-section">
            <div class="avatar-container">
                <div class="avatar-inner">聶</div>
            </div>
            <h1 class="name">聶.NET</h1>
            <p class="bio">
                Fujian / Server Administrator<br>
                IDC System & Virtualization
            </p>
            
            <div class="btn-group">
                <a href="https://blog.i8-mc.cn" class="icon-btn" title="Blog">B</a>
                <a href="#" class="icon-btn" title="Telegram Bot">T</a>
                <a href="#" class="icon-btn" title="Email">E</a>
            </div>
        </div>

        <div class="content-section">
            <div class="inset-panel">
                <div class="panel-title">Infrastructure Stack</div>
                
                <div class="skill-item">
                    <div class="skill-info">
                        <span>Debian / RedHat Linux</span>
                        <span>95%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" data-width="95%"></div>
                    </div>
                </div>

                <div class="skill-item">
                    <div class="skill-info">
                        <span>Proxmox VE (Dell/Supermicro)</span>
                        <span>90%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" data-width="90%"></div>
                    </div>
                </div>

                <div class="skill-item">
                    <div class="skill-info">
                        <span>TG Bot Automation</span>
                        <span>80%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" data-width="80%"></div>
                    </div>
                </div>
            </div>

            <a href="https://blog.i8-mc.cn" class="block-btn">ENTER SYSTEM</a>
        </div>
    </div>

    <script>
        // 页面加载完毕后，触发进度条生长动画，提升视觉质感
        window.onload = () => {
            setTimeout(() => {
                document.querySelectorAll('.progress-bar-fill').forEach(bar => {
                    const targetWidth = bar.getAttribute('data-width');
                    bar.style.width = targetWidth;
                });
            }, 300); // 略微延迟让进入页面的动画更自然
        };
    </script>
</body>
</html>
